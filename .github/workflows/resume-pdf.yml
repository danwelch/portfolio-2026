name: Resume PDF

# Regenerate the resume PDF on pull requests that touch the resume page or its
# source data, and commit it back to the PR branch. This makes the regenerated
# PDF part of the PR so it can be verified in the Vercel preview before merge.
# Only the resume-related paths trigger this — not every PR.
#
# Rather than building the app a second time in CI (Vercel already builds the
# same commit), this renders the PDF from the live Vercel *preview* deployment.
# It waits for that preview to be ready via a poll-with-timeout to avoid racing
# Vercel's build. Previews are protected by Vercel Authentication, so the
# generate step passes a Protection Bypass for Automation token
# (the VERCEL_AUTOMATION_BYPASS_SECRET secret) to reach the page.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/app/resume/**"
      - "src/lib/content.ts"
      - "src/app/globals.css"
      - "scripts/generate-resume-pdf.mjs"

# contents: write to commit the regenerated PDF back to the PR branch;
# deployments: read to look up the Vercel preview URL for the head commit.
permissions:
  contents: write
  deployments: read

# Avoid overlapping runs racing to commit the same file on a busy PR.
concurrency:
  group: resume-pdf-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    # The Vercel preview auth-bypass secret lives in this GitHub Environment;
    # declaring it here is what makes that environment-scoped secret available.
    environment: Preview
    # Pushing back to a fork's branch isn't permitted with GITHUB_TOKEN, so only
    # run for same-repo PRs (where the preview + auto-commit flow applies).
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v5
        with:
          # Check out the PR's source branch (not the detached merge ref) so we
          # can commit and push the regenerated PDF back to it.
          ref: ${{ github.head_ref }}

      - uses: pnpm/action-setup@v5
        with:
          version: 11.6.0

      - uses: actions/setup-node@v5
        with:
          # pnpm 11 requires Node >= 22.13 (uses the node:sqlite builtin).
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Cache the downloaded browser (~150MB). On a cache hit we skip the
      # download and only (re)install the OS libraries Chromium needs.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Chromium (full) on cache miss
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Chromium OS deps on cache hit
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      # Wait for Vercel's preview deployment of this exact commit, then capture
      # its URL. Polls with a timeout so we don't race Vercel's build.
      - name: Resolve Vercel preview URL
        id: preview
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.pull_request.head.sha }}
          TIMEOUT_SECONDS: "600"
        run: |
          set -euo pipefail
          echo "Waiting for a successful Vercel preview deployment for $SHA..."
          deadline=$(( $(date +%s) + TIMEOUT_SECONDS ))
          url=""
          while [ "$(date +%s)" -lt "$deadline" ]; do
            for id in $(gh api \
              "repos/${GITHUB_REPOSITORY}/deployments?sha=${SHA}&environment=Preview" \
              -q '.[].id' 2>/dev/null || true); do
              # Statuses come back newest-first; act on the current state.
              state=$(gh api "repos/${GITHUB_REPOSITORY}/deployments/${id}/statuses" \
                -q '.[0].state' 2>/dev/null || echo "")
              case "$state" in
                success)
                  url=$(gh api "repos/${GITHUB_REPOSITORY}/deployments/${id}/statuses" \
                    -q '[.[] | select(.state=="success" and .environment_url != null)][0].environment_url' \
                    2>/dev/null || echo "")
                  if [ -n "$url" ] && [ "$url" != "null" ]; then break 2; fi
                  ;;
                failure|error)
                  echo "::warning::Vercel deployment $id reported state=$state; will keep waiting for another."
                  ;;
              esac
            done
            sleep 10
          done
          if [ -z "$url" ] || [ "$url" = "null" ]; then
            echo "::error::Timed out after ${TIMEOUT_SECONDS}s waiting for a Vercel preview for $SHA."
            exit 1
          fi
          echo "Preview URL: $url"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      # Render the PDF from the live preview (script skips booting its own server
      # because RESUME_BASE_URL is already serving). The bypass secret lets
      # Playwright through Vercel's preview auth wall.
      - name: Generate resume PDF
        env:
          RESUME_BASE_URL: ${{ steps.preview.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: pnpm resume:pdf

      # No trigger loop: this commit is pushed with GITHUB_TOKEN (whose pushes
      # don't start new workflow runs) and carries [skip ci]. The path filter
      # does NOT prevent it — for pull_request it matches the whole PR diff,
      # which always includes resume files.
      - name: Commit regenerated PDF if it changed
        run: |
          # Glob, not a fixed name: the filename tracks the resume subtitle
          # (see content.ts), so a subtitle change renames the file and this
          # must pick up both the new file and the deletion of the old one.
          PDF_GLOB="public/Dan_Welch_Resume_*.pdf"
          if [[ -n "$(git status --porcelain -- "$PDF_GLOB")" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A -- "$PDF_GLOB"
            git commit -m "chore: regenerate resume PDF [skip ci]"
            git push
          else
            echo "Resume PDF already up to date — nothing to commit."
          fi
